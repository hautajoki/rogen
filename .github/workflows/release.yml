name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Cross-compile Binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X github.com/hautajoki/rogen/internal/rogen.Version=${VERSION}"
          mkdir -p releases

          build() {
            local goos="$1" goarch="$2" label="$3" binary="rogen"
            [ "$goos" = "windows" ] && binary="rogen.exe"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "$LDFLAGS" -o "$binary" .
            if [ "$goos" = "linux" ]; then
              tar -czf "releases/rogen-${GITHUB_REF_NAME}-${label}.tar.gz" "$binary"
            else
              zip -q "releases/rogen-${GITHUB_REF_NAME}-${label}.zip" "$binary"
            fi
            rm -f "$binary"
          }

          build linux amd64 linux-x86_64
          build windows amd64 windows-x86_64
          build darwin amd64 macos-x86_64
          build darwin arm64 macos-arm64

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
